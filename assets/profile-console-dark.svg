    .eyebrow { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; letter-spacing: 1.8px; fill: #58A6FF; }
    .headline { font: 700 28px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #E6EDF3; }
    .subhead { font: 500 16px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #8B949E; }
    .label { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #F0883E; }
    .value { font: 500 17px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #E6EDF3; }
    .ascii { font: 600 9.4px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #E6EDF3; opacity: 0.88; }
    .ascii-edge { font: 700 9.4px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #58A6FF; opacity: 0.55; }
    .metric-value { font: 800 26px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #E6EDF3; }
    .metric-label { font: 700 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; letter-spacing: 1px; fill: #8B949E; }
    .leader { stroke: #30363D; stroke-width: 1; stroke-dasharray: 2 5; }
    .value-backdrop { fill: #0D1117; }
    .metric-card { fill: #161B22; stroke: #30363D; }
  </style>

