name: Refresh profile console

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-profile-console
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Rebuild profile console
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/update_profile_assets.py

      - name: Commit changed public stats
        run: |
          if git diff --quiet -- assets/profile-console-light.svg assets/profile-console-dark.svg; then
            echo "Profile stats are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-console-light.svg assets/profile-console-dark.svg
          git commit -m "chore: refresh profile console"
          git push
